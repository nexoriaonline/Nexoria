name: Build Nexoria Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Nexoria APK
        run: |
          # Usar o repositório de build oficial e estável para Android
          git clone --recursive https://github.com/OTCv8/otclientv8-android-build.git build-env
          
          # Limpar assets padrão e colocar os do Nexoria
          rm -rf build-env/app/src/main/assets/*
          mkdir -p build-env/app/src/main/assets/
          cp -r client/data build-env/app/src/main/assets/
          cp -r client/modules build-env/app/src/main/assets/
          cp client/init.lua build-env/app/src/main/assets/
          
          # Adicionar gráficos (things) via download automático
          mkdir -p build-env/app/src/main/assets/data/things/860
          wget https://github.com/vinisdl/tibia-client-860-linux/raw/master/Tibia.dat -O build-env/app/src/main/assets/data/things/860/Nexoria.dat
          wget https://github.com/vinisdl/tibia-client-860-linux/raw/master/Tibia.spr -O build-env/app/src/main/assets/data/things/860/Nexoria.spr
          
          # Ajustar nome do App no Manifesto Android
          sed -i 's/android:label="OTCv8"/android:label="Nexoria Online"/g' build-env/app/src/main/AndroidManifest.xml
          
          # Compilar
          cd build-env
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Nexoria APK
        uses: actions/upload-artifact@v3
        with:
          name: Nexoria-Online-Final
          path: build-env/app/build/outputs/apk/debug/*.apk
