name: Build Nexoria Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libglu1-mesa-dev freeglut3-dev libopenal-dev libvorbis-dev libogg-dev libcurl4-openssl-dev libfreetype6-dev libglew-dev libbz2-dev

      - name: Build Android APK
        run: |
          git clone https://github.com/OTCv8/otcv8-dev.git dev
          cd dev
          mkdir build-android && cd build-android
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=armeabi-v7a -DANDROID_PLATFORM=android-21 -DANDROID_STL=c++_static
          make -j$(nproc)
          
      - name: Prepare Assets
        run: |
          mkdir -p assets
          cp -r client/data assets/
          cp -r client/modules assets/
          cp client/init.lua assets/
          
      - name: Upload Nexoria APK
        uses: actions/upload-artifact@v3
        with:
          name: Nexoria-Online-Android
          path: dev/build-android/*.apk
