// SPELLS / MAGIAS
// ============================================================
const SPELLS = [
    { id: 0, name: 'Poção de Vida', icon: '🧪', desc: 'Restaura 50 HP', cost: 0, type: 'heal', value: 50, cooldown: 1000 },
    { id: 1, name: 'Poção de Mana', icon: '💧', desc: 'Restaura 50 MP', cost: 0, type: 'mana', value: 50, cooldown: 1000 },
    { id: 2, name: 'Exura', icon: '✨', desc: 'Cura leve (20 HP)', cost: 20, type: 'heal', value: 20, cooldown: 2000 },
    { id: 3, name: 'Exori', icon: '⚡', desc: 'Ataque mágico (30 dmg)', cost: 30, type: 'attack', value: 30, cooldown: 2000 },
    { id: 4, name: 'Exori Gran', icon: '🔥', desc: 'Ataque poderoso (80 dmg)', cost: 80, type: 'attack', value: 80, cooldown: 4000 },
    { id: 5, name: 'Exori Vis', icon: '⚔️', desc: 'Ataque rápido (15 dmg)', cost: 15, type: 'attack', value: 15, cooldown: 1500 },
];

function castSpell(spellId) {
    const spell = SPELLS[spellId];
    if (!spell) return;
    const now = Date.now();
    if (Game.spellCooldowns[spellId] && now < Game.spellCooldowns[spellId]) {
        const remaining = ((Game.spellCooldowns[spellId] - now) / 1000).toFixed(1);
        addChat(`${spell.name} em cooldown (${remaining}s)`, 'system');
        return;
    }
    if (spell.cost > 0 && Game.player.mp < spell.cost) {
        addChat('Mana insuficiente!', 'system');
        return;
    }

    Game.spellCooldowns[spellId] = now + spell.cooldown;
    Game.player.mp = Math.max(0, Game.player.mp - spell.cost);

    if (spell.type === 'heal') {
        Game.player.hp = Math.min(Game.player.maxHp, Game.player.hp + spell.value);
        addChat(`${spell.icon} ${spell.name}: +${spell.value} HP`, 'server');
        addMagicEffect({ x: Game.player.x, y: Game.player.y }, 7);
    } else if (spell.type === 'mana') {
        Game.player.mp = Math.min(Game.player.maxMp, Game.player.mp + spell.value);
        addChat(`${spell.icon} ${spell.name}: +${spell.value} MP`, 'server');
        addMagicEffect({ x: Game.player.x, y: Game.player.y }, 6);
    } else if (spell.type === 'attack') {
        const target = Game.player.attackTarget ? Game.creatures.get(Game.player.attackTarget) : null;
        if (target && target.hp > 0) {
            const dmg = spell.value + Math.floor(Math.random() * 10);
            target.hp = Math.max(0, target.hp - dmg);
            target.hpPercent = Math.round(target.hp / target.maxHp * 100);
            showDamageNumber('-' + dmg, { x: target.x, y: target.y }, 2);
            addMagicEffect({ x: target.x, y: target.y }, 2);
            addChat(`${spell.icon} ${spell.name}: ${dmg} dano em ${target.name}!`, 'server');
            if (target.hp <= 0) monsterDied(target);
        } else {
            addChat('Selecione um alvo primeiro!', 'system');
        }
    }
    updateStatusBar();
    startHotkeyCD(spellId, spell.cooldown);
}

function startHotkeyCD(spellId, duration) {
    const cdEl = document.getElementById(`hk${spellId+1}cd`);
    if (!cdEl) return;
    cdEl.style.display = 'flex';
    const start = Date.now();
    const interval = setInterval(() => {
        const elapsed = Date.now() - start;
        const remaining = Math.max(0, (duration - elapsed) / 1000);
        cdEl.textContent = remaining.toFixed(1);
        if (elapsed >= duration) {
            cdEl.style.display = 'none';
            clearInterval(interval);
        }
    }, 100);
}

function updateStatusBar() {
    const p = Game.player;
    document.getElementById('playerName').textContent = p.name || 'Nexoria';
    const vocNames = ['Nenhum','Sorcerer','Druid','Paladin','Knight'];
    document.getElementById('playerInfo').textContent = `Lv.${p.level} | ${vocNames[p.vocation] || 'Nenhum'}`;
    document.getElementById('hpVal').textContent = `${p.hp}/${p.maxHp}`;
    document.getElementById('mpVal').textContent = `${p.mp}/${p.maxMp}`;
    const hpPct = p.maxHp > 0 ? (p.hp / p.maxHp * 100) : 0;
    const mpPct = p.maxMp > 0 ? (p.mp / p.maxMp * 100) : 0;
    document.getElementById('hpBar').style.width = hpPct + '%';
    document.getElementById('mpBar').style.width = mpPct + '%';

    // EXP para próximo nível
    const expNeeded = p.level * p.level * 100;
    const expPrev = (p.level - 1) * (p.level - 1) * 100;
    const expPct = expNeeded > expPrev ? ((p.exp - expPrev) / (expNeeded - expPrev) * 100) : 0;
    document.getElementById('expBar').style.width = Math.min(100, expPct) + '%';
    document.getElementById('expVal').textContent = Math.round(expPct) + '%';
}

function updatePosDisplay() {
    document.getElementById('posDisplay').textContent = `Pos: ${Game.player.x},${Game.player.y},${Game.player.z}`;
    document.getElementById('minimapLabel').textContent = `${Game.player.x},${Game.player.y}`;
}

function addChat(msg, type = 'system') {
    const el = document.createElement('div');
    el.className = `chat-msg ${type}`;
    el.textContent = msg;
    const chatEl = document.getElementById('chatMessages');
    chatEl.appendChild(el);
    chatEl.scrollTop = chatEl.scrollHeight;
    // Limitar histórico
    while (chatEl.children.length > 50) chatEl.removeChild(chatEl.firstChild);
    Game.chat.push({ msg, type, time: Date.now() });
}

function showDamageNumber(text, pos, colorIdx) {
    const colors = ['#ff4444','#ff8844','#ffdd44','#44ff88','#44aaff','#aa44ff'];
    const color = colors[colorIdx % colors.length];
    const offsetX = Math.floor(canvas.width / 2) - Math.floor(VIEW_W / 2) * TILE_SIZE;
    const offsetY = Math.floor(canvas.height / 2) - Math.floor(VIEW_H / 2) * TILE_SIZE;
    const screenX = offsetX + (pos.x - Game.player.x + Math.floor(VIEW_W/2)) * TILE_SIZE + TILE_SIZE/2;
    const screenY = offsetY + (pos.y - Game.player.y + Math.floor(VIEW_H/2)) * TILE_SIZE;
    const el = document.createElement('div');
    el.className = 'damage-number';
    el.style.left = screenX + 'px';
    el.style.top = screenY + 'px';
    el.style.color = color;
    el.textContent = text;
    document.getElementById('gameScreen').appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

function updateInventoryUI() {
    const grid = document.getElementById('inventoryGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 20; i++) {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        const item = Game.player.inventory[i];
        if (item) {
            slot.innerHTML = `${item.emoji || getItemEmoji(item.id || 0)}${item.count > 1 ? `<span class="item-count">${item.count}</span>` : ''}<span class="item-tooltip">${item.name || 'Item'}</span>`;
            slot.onclick = () => useInventoryItem(i);
        }
        grid.appendChild(slot);
    }
}

function useInventoryItem(slot) {
    const item = Game.player.inventory[slot];
    if (!item) return;
    if (item.name && item.name.includes('Poção')) {
        if (item.name.includes('Vida')) {
            Game.player.hp = Math.min(Game.player.maxHp, Game.player.hp + 50);
            addChat('Usou Poção de Vida: +50 HP', 'server');
        } else if (item.name.includes('Mana')) {
            Game.player.mp = Math.min(Game.player.maxMp, Game.player.mp + 50);
            addChat('Usou Poção de Mana: +50 MP', 'server');
        }
        item.count = (item.count || 1) - 1;
        if (item.count <= 0) Game.player.inventory[slot] = null;
        updateInventoryUI();
        updateStatusBar();
    }
}

// ============================================================
// JOYSTICK
// ============================================================
const joystickBase = document.getElementById('joystickBase');
const joystickStick = document.getElementById('joystickStick');
let joystickActive = false;
let joystickDir = null;
let joystickMoveInterval = null;

function getJoystickDir(dx, dy) {
    const threshold = 15;
    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return null;
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    if (angle > -22.5 && angle <= 22.5) return 'e';
    if (angle > 22.5 && angle <= 67.5) return 'se';
    if (angle > 67.5 && angle <= 112.5) return 's';
    if (angle > 112.5 && angle <= 157.5) return 'sw';
    if (angle > 157.5 || angle <= -157.5) return 'w';
    if (angle > -157.5 && angle <= -112.5) return 'nw';
    if (angle > -112.5 && angle <= -67.5) return 'n';
    if (angle > -67.5 && angle <= -22.5) return 'ne';
    return null;
}

function handleJoystickMove(e) {
    if (!joystickActive) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const rect = joystickBase.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const maxDist = 35;
    const dist = Math.min(maxDist, Math.sqrt(dx*dx + dy*dy));
    const angle = Math.atan2(dy, dx);
    joystickStick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
    joystickDir = getJoystickDir(dx, dy);
}

joystickBase.addEventListener('touchstart', (e) => {
    joystickActive = true;
    handleJoystickMove(e);
    joystickMoveInterval = setInterval(() => {
        if (joystickDir) movePlayer(joystickDir);
    }, Game.moveDelay);
}, { passive: false });

joystickBase.addEventListener('touchmove', handleJoystickMove, { passive: false });

joystickBase.addEventListener('touchend', () => {
    joystickActive = false;
    joystickDir = null;
    joystickStick.style.transform = 'translate(-50%, -50%)';
    if (joystickMoveInterval) { clearInterval(joystickMoveInterval); joystickMoveInterval
 = null; }
});

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    
    const key = e.key;
    if (MOVE_KEYS[key]) {
        e.preventDefault();
        movePlayer(MOVE_KEYS[key]);
    }
    
    // Hotkeys F1-F6
    if (key === 'F1') { e.preventDefault(); castSpell(0); }
    if (key === 'F2') { e.preventDefault(); castSpell(1); }
    if (key === 'F3') { e.preventDefault(); castSpell(2); }
    if (key === 'F4') { e.preventDefault(); castSpell(3); }
    if (key === 'F5') { e.preventDefault(); castSpell(4); }
    if (key === 'F6') { e.preventDefault(); castSpell(5); }
    if (key === ' ') { e.preventDefault(); attackNearestMonster(); }
});
